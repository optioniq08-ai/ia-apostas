<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>IA Apostas Pro</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h1>IA APOSTAS PROFISSIONAL</h1>

  <button onclick="buscarJogos()" style="padding:15px; font-size:18px;">
    BUSCAR JOGOS REAIS
  </button>

  <div id="resultado" style="margin-top:30px;"></div>

  <script>
    async function buscarJogos() {

      const apiKey = "ff37acdec5475faf1251028fb7487dc6";

      const resposta = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
        method: "GET",
        headers: {
          "x-apisports-key": apiKey
        }
      });

      const dados = await resposta.json();

      let html = "<h2>Jogos ao Vivo:</h2>";

      dados.response.forEach(jogo => {
        html += `
          <p>
            ${jogo.teams.home.name} ${jogo.goals.home} x ${jogo.goals.away} ${jogo.teams.away.name}
          </p>
        `;
      });

      document.getElementById("resultado").innerHTML = html;
    }
  </script>

</body>
</html>
