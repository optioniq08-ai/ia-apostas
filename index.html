<!DOCTYPE html>

<html>
<body>

<h1>IA Apostas PRO</h1>

<button onclick="rodar()">Analisar Jogos</button>

<div id="resultado"></div>

<script>
function rodar() {
  let html = "";

  for (let i = 0; i < 5; i++) {
    let prob = Math.random();
    let odd = (Math.random() * 2 + 1).toFixed(2);
    let ev = prob - (1/odd);

    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        Jogo ${i+1}<br>
        Prob: ${(prob*100).toFixed(1)}%<br>
        Odd: ${odd}<br>
        EV: ${ev.toFixed(3)}
      </div>
    `;
  }

  document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
